name: Bug report
description: Report something that is broken or behaving unexpectedly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: locale
    attributes:
      label: Which language were you viewing?
      options:
        - 中文 (zh)
        - English (en)
        - Both / not sure
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Browser / OS / device
      placeholder: e.g. Chrome 126 on Windows 11
    validations:
      required: false
